services:
  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticketfast_test
    tmpfs:
      - /var/lib/postgresql/data
    ports:
      - "5433:5432"

  api-test:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db-test
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db-test:5432/ticketfast_test
    ports:
      - "8001:8000"